<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mis Hábitos" />
  <meta name="theme-color" content="#0f0f14" />
  <title>Mis Hábitos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0f0f14; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; min-height: 100vh; padding-top: env(safe-area-inset-top); padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }
    #app { max-width: 480px; margin: 0 auto; }

    .header { padding: 20px 20px 16px; border-bottom: 1px solid #1e1e2e; }
    .header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .header p { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .nav { display: flex; gap: 8px; margin-top: 14px; }
    .nav button { flex: 1; padding: 9px 0; border-radius: 10px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; }
    .nav button.active { background: #6366f1; color: #fff; }
    .nav button:not(.active) { background: #1e1e2e; color: #6b7280; }

    .week-strip { display: flex; gap: 6px; overflow-x: auto; padding: 14px 20px; scrollbar-width: none; }
    .week-strip::-webkit-scrollbar { display: none; }
    .day-chip { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 11px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; }
    .day-chip.selected { background: #6366f1; }
    .day-chip:not(.selected) { background: #1e1e2e; }
    .day-chip.today:not(.selected) { border-color: #6366f1; }
    .day-chip .dn { font-size: 11px; font-weight: 600; color: #6b7280; }
    .day-chip.selected .dn { color: #c7d2fe; }
    .day-chip .dd { font-size: 16px; font-weight: 700; color: #9ca3af; }
    .day-chip.selected .dd { color: #fff; }
    .score-dot { width: 6px; height: 6px; border-radius: 50%; }

    .pad { padding: 0 20px; }
    .type-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
    .type-toggle button { flex: 1; padding: 10px 0; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
    .tf.active { background: #065f46; color: #34d399; }
    .tf:not(.active) { background: #1e1e2e; color: #6b7280; }
    .tg.active { background: #1e3a5f; color: #60a5fa; }
    .tg:not(.active) { background: #1e1e2e; color: #6b7280; }

    .card { background: #1a1a24; border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid #2a2a3a; }
    .card-title { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }

    .meal-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .meal-chip { padding: 7px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
    .meal-chip.active { background: #065f46; color: #34d399; }
    .meal-chip:not(.active) { background: #1e1e2e; color: #6b7280; }

    .upload-zone { border: 2px dashed #2a2a3a; border-radius: 12px; padding: 24px 20px; text-align: center; cursor: pointer; margin-bottom: 12px; }
    .upload-zone .uz-icon { font-size: 28px; margin-bottom: 6px; }
    .upload-zone .uz-text { font-size: 13px; color: #6b7280; }
    .upload-zone .uz-sub { font-size: 11px; color: #374151; margin-top: 2px; }

    .preview-wrap { position: relative; margin-bottom: 10px; }
    .preview-img { width: 100%; border-radius: 10px; max-height: 220px; object-fit: cover; display: block; }
    .preview-remove { position: absolute; top: 8px; right: 8px; background: #0f0f14cc; border: none; border-radius: 20px; color: #f87171; cursor: pointer; font-size: 13px; padding: 4px 10px; font-weight: 600; }

    .img-actions { display: flex; gap: 8px; margin-top: 6px; }
    .img-actions .btn-ai { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-size: 14px; background: #6366f1; color: #fff; }
    .img-actions .btn-save-photo { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #374151; cursor: pointer; font-weight: 600; font-size: 13px; background: none; color: #9ca3af; }
    .img-actions button:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider { display: flex; align-items: center; gap: 10px; margin: 12px 0; color: #374151; font-size: 12px; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #2a2a3a; }

    textarea { width: 100%; background: #0f0f14; border: 1px solid #2a2a3a; border-radius: 10px; color: #e2e8f0; padding: 12px; font-size: 16px; resize: none; outline: none; font-family: inherit; }
    textarea:focus { border-color: #6366f1; }
    input[type=text] { background: #0f0f14; border: 1px solid #2a2a3a; border-radius: 8px; color: #e2e8f0; padding: 10px 12px; font-size: 15px; outline: none; font-family: inherit; width: 100%; }
    input[type=text]:focus { border-color: #6366f1; }

    .btn-primary { width: 100%; padding: 13px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-size: 15px; background: #6366f1; color: #fff; margin-top: 10px; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-secondary { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid #374151; cursor: pointer; font-weight: 600; font-size: 14px; background: none; color: #9ca3af; margin-top: 8px; }

    .ingredients-panel { background: #0f0f14; border-radius: 12px; padding: 14px; margin-top: 10px; border: 1px solid #2a2a3a; }
    .ing-title { font-size: 13px; font-weight: 600; color: #9ca3af; margin-bottom: 10px; }
    .ing-list { display: flex; flex-direction: column; gap: 6px; }
    .ing-item { display: flex; align-items: center; gap: 8px; }
    .ing-item input { flex: 1; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px; color: #e2e8f0; padding: 8px 10px; font-size: 14px; outline: none; font-family: inherit; width: auto; }
    .ing-item input:focus { border-color: #6366f1; }
    .ing-del { background: none; border: none; color: #f87171; cursor: pointer; font-size: 20px; padding: 0 4px; line-height: 1; flex-shrink: 0; }
    .ing-add { display: flex; gap: 6px; margin-top: 8px; }
    .ing-add input { flex: 1; background: #1a1a24; border: 1px dashed #374151; border-radius: 8px; color: #e2e8f0; padding: 8px 10px; font-size: 14px; outline: none; font-family: inherit; width: auto; }
    .ing-add button { padding: 8px 14px; background: #1e3a5f; border: none; border-radius: 8px; color: #60a5fa; font-weight: 600; cursor: pointer; font-size: 13px; white-space: nowrap; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-right: 6px; margin-top: 4px; }
    .tip { margin-top: 12px; font-size: 13px; color: #a78bfa; border-left: 3px solid #6366f1; padding-left: 10px; }

    .gym-btns { display: flex; gap: 10px; }
    .gym-btn { flex: 1; padding: 24px 0; border-radius: 14px; cursor: pointer; font-size: 32px; text-align: center; border: none; }
    .gym-btn-yes { background: #052e16; border: 2px solid #4ade8044; color: #4ade80; }
    .gym-btn-no { background: #2d0a0a; border: 2px solid #f8717144; color: #f87171; }
    .gym-btn span { font-size: 13px; display: block; margin-top: 6px; }
    .gym-registered { text-align: center; padding: 16px 0; }
    .change-btn { margin-top: 10px; background: none; border: 1px solid #374151; border-radius: 8px; color: #6b7280; cursor: pointer; padding: 7px 16px; font-size: 12px; }

    .section-title { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin: 16px 0 10px; }

    /* Log item with edit/delete actions */
    .log-item { background: #1a1a24; border-radius: 12px; border: 1px solid #2a2a3a; border-left: 3px solid; padding: 12px; margin-bottom: 10px; }
    .log-item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .log-item-body { flex: 1; min-width: 0; }
    .log-main { font-size: 14px; color: #e2e8f0; font-weight: 500; }
    .log-sub { font-size: 12px; color: #4b5563; margin-top: 3px; line-height: 1.5; }
    .log-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .log-edit-btn { background: none; border: 1px solid #374151; border-radius: 7px; color: #9ca3af; cursor: pointer; font-size: 12px; padding: 4px 8px; }
    .log-del-btn { background: none; border: 1px solid #3b1515; border-radius: 7px; color: #f87171; cursor: pointer; font-size: 12px; padding: 4px 8px; }
    .log-photo { width: 100%; border-radius: 8px; margin-top: 8px; max-height: 180px; object-fit: cover; display: block; cursor: pointer; }

    /* Edit modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: #000000cc; z-index: 900; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1a24; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; border-top: 1px solid #2a2a3a; }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #fff; }
    .modal-field { margin-bottom: 14px; }
    .modal-label { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; display: block; }
    .modal-footer { display: flex; gap: 8px; margin-top: 16px; }
    .modal-footer .btn-save { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-size: 14px; background: #059669; color: #fff; }
    .modal-footer .btn-cancel { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #374151; cursor: pointer; font-weight: 600; font-size: 14px; background: none; color: #9ca3af; }

    /* Photo overlay */
    .photo-overlay { display: none; position: fixed; inset: 0; background: #000000ee; z-index: 999; align-items: center; justify-content: center; }
    .photo-overlay.open { display: flex; }
    .photo-overlay img { max-width: 96vw; max-height: 90vh; border-radius: 12px; object-fit: contain; }
    .photo-overlay-close { position: fixed; top: 20px; right: 20px; background: #1a1a24; border: none; color: #e2e8f0; font-size: 22px; cursor: pointer; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; z-index: 1000; }

    .week-grid { display: flex; gap: 6px; }
    .week-cell { flex: 1; background: #0f0f14; border-radius: 10px; padding: 10px 4px; text-align: center; }
    .stats-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .stat-card { flex: 1; background: #1a1a24; border-radius: 14px; padding: 14px 8px; border: 1px solid #2a2a3a; text-align: center; }
    .stat-num { font-size: 24px; font-weight: 800; }
    .stat-label { font-size: 12px; color: #6b7280; margin-top: 4px; }

    /* Export button */
    .export-btn { width: 100%; padding: 13px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-size: 14px; background: #1e3a5f; color: #60a5fa; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }

    .delete-all { width: 100%; padding: 11px; background: none; border: 1px solid #374151; border-radius: 10px; color: #f87171; cursor: pointer; font-size: 13px; margin-top: 4px; }
    .empty { text-align: center; color: #374151; font-size: 14px; padding: 30px 0; line-height: 1.8; }
    .error-msg { color: #f87171; font-size: 13px; text-align: center; margin-top: 10px; }
    .success-msg { color: #4ade80; font-size: 14px; font-weight: 600; text-align: center; padding: 12px; background: #052e1644; border-radius: 10px; margin-bottom: 10px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ffffff44; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Export snapshot canvas */
    #export-canvas { display: none; }
  </style>
</head>
<body>
<div id="app"></div>
<canvas id="export-canvas"></canvas>

<!-- Photo overlay -->
<div class="photo-overlay" id="photo-overlay" onclick="closePhoto()">
  <button class="photo-overlay-close" onclick="closePhoto()">✕</button>
  <img id="photo-overlay-img" src="" />
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="edit-modal" onclick="handleModalBgClick(event)">
  <div class="modal" id="modal-content">
    <h3>✏️ Editar registro</h3>
    <div class="modal-field">
      <label class="modal-label">Descripción</label>
      <textarea id="edit-resumen" rows="2"></textarea>
    </div>
    <div class="modal-field" id="edit-ing-section">
      <label class="modal-label">Ingredientes</label>
      <div id="edit-ing-list"></div>
      <div class="ing-add" style="margin-top:8px">
        <input type="text" id="edit-new-ing" placeholder="Agregar ingrediente..." />
        <button onclick="modalAddIngredient()">+ Agregar</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">Guardar</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "mis_habitos_v5";
const MEAL_TYPES = [
  { key: "desayuno", emoji: "☀️",  label: "Desayuno" },
  { key: "almuerzo", emoji: "🍽️", label: "Almuerzo" },
  { key: "merienda", emoji: "🫖",  label: "Merienda" },
  { key: "cena",     emoji: "🌙",  label: "Cena"     },
  { key: "colacion", emoji: "🍎",  label: "Colación" },
];
const DAYS_ES = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const DAYS_FULL = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

let state = {
  logs: [],
  view: "log",
  logType: "food",
  mealType: "desayuno",
  imageBase64: null,
  imagePreviewUrl: null,
  manualText: "",
  aiStep: "input",
  aiResult: null,
  editIngredients: [],
  newIngredient: "",
  loading: false,
  error: null,
  selectedDay: todayKey(),
};

// currently editing log
let editingLogId = null;
let modalIngredients = [];

function todayKey() { return new Date().toISOString().split("T")[0]; }
function formatDate(s) { const [y,m,d]=s.split("-"); return `${d}/${m}/${y}`; }
function getWeekDays() {
  const days=[], today=new Date();
  for(let i=6;i>=0;i--){ const d=new Date(today); d.setDate(today.getDate()-i); days.push(d.toISOString().split("T")[0]); }
  return days;
}
function escH(s) {
  if(!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function loadLogs() {
  try { const s=localStorage.getItem(STORAGE_KEY); if(s) state.logs=JSON.parse(s); } catch(e) { state.logs=[]; }
}
function saveLogs() {
  const logsToSave = state.logs.map((l,i) => {
    const fromEnd = state.logs.length - 1 - i;
    return fromEnd > 15 ? {...l, imageData: null} : l;
  });
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(logsToSave));
  } catch(e) {
    try {
      const noImages = state.logs.map(l => ({...l, imageData: null}));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(noImages));
    } catch(e2) { console.error("Storage full", e2); }
  }
}

function getDayLogs(day) { return state.logs.filter(l=>l.date===day); }
function qualityColor(q) {
  if(q==="buena"||q==="alta") return "#4ade80";
  if(q==="regular"||q==="media"||q==="medio") return "#facc15";
  return "#f87171";
}
function scoreColor(s) {
  if(s===null) return "#374151";
  if(s>=70) return "#4ade80";
  if(s>=40) return "#facc15";
  return "#f87171";
}
function getDayScore(day) {
  const dl=getDayLogs(day);
  const food=dl.filter(l=>l.logType==="food");
  const train=dl.filter(l=>l.logType==="training");
  let score=0,total=0;
  food.forEach(f=>{ total++; if(f.calidad==="buena") score++; else if(f.calidad==="regular") score+=0.5; });
  if(train.length>0){ total++; if(train.some(t=>t.fue)) score++; }
  return total===0?null:Math.round((score/total)*100);
}

// ── Photo overlay ──────────────────────────────────────
function openPhoto(src) {
  document.getElementById("photo-overlay-img").src=src;
  document.getElementById("photo-overlay").classList.add("open");
}
function closePhoto() { document.getElementById("photo-overlay").classList.remove("open"); }

// ── Edit modal ─────────────────────────────────────────
function openEditModal(id) {
  const log = state.logs.find(l=>l.id===id);
  if(!log) return;
  editingLogId = id;
  modalIngredients = (log.ingredientes||[]).map((v,i)=>({id:Date.now()+i, val:v}));
  document.getElementById("edit-resumen").value = log.resumen||"";
  // hide ingredients section for gym logs
  document.getElementById("edit-ing-section").style.display = log.logType==="training" ? "none" : "block";
  renderModalIngredients();
  document.getElementById("edit-modal").classList.add("open");
}
function closeModal() {
  document.getElementById("edit-modal").classList.remove("open");
  editingLogId=null; modalIngredients=[];
}
function handleModalBgClick(e) {
  if(e.target===document.getElementById("edit-modal")) closeModal();
}
function renderModalIngredients() {
  const list = document.getElementById("edit-ing-list");
  if(!list) return;
  list.innerHTML = modalIngredients.map(ing=>`
    <div class="ing-item" style="margin-bottom:6px">
      <input type="text" value="${escH(ing.val)}" oninput="modalUpdateIng(${ing.id},this.value)" />
      <button class="ing-del" onclick="modalDeleteIng(${ing.id})">×</button>
    </div>`).join("");
}
function modalUpdateIng(id,val) { modalIngredients=modalIngredients.map(i=>i.id===id?{...i,val}:i); }
function modalDeleteIng(id) { modalIngredients=modalIngredients.filter(i=>i.id!==id); renderModalIngredients(); }
function modalAddIngredient() {
  const inp=document.getElementById("edit-new-ing");
  const v=inp.value.trim(); if(!v) return;
  modalIngredients.push({id:Date.now(),val:v});
  inp.value="";
  renderModalIngredients();
}
function saveEdit() {
  if(!editingLogId) return;
  const resumen = document.getElementById("edit-resumen").value.trim();
  const ingredients = modalIngredients.map(i=>i.val).filter(v=>v.trim());
  state.logs = state.logs.map(l => l.id===editingLogId
    ? {...l, resumen: resumen||l.resumen, ingredientes: ingredients}
    : l
  );
  saveLogs();
  closeModal();
  render();
}

// ── Delete ─────────────────────────────────────────────
function removeLog(id) {
  if(!confirm("¿Eliminar este registro?")) return;
  state.logs=state.logs.filter(l=>l.id!==id);
  saveLogs(); render();
}

// ── AI analysis ────────────────────────────────────────
async function analyzeImage() {
  if(!state.imageBase64) return;
  state.loading=true; state.error=null; render();
  try {
    const system=`Sos un nutricionista. Analizá esta foto de comida.
Respondé SOLO con JSON, sin markdown:
{"tipo":"alimentacion","resumen":"nombre del plato en 1 línea","ingredientes":["ingrediente 1","ingrediente 2"],"calorias_estimadas":null,"calidad":"buena|regular|mala","proteinas":"alta|media|baja","carbohidratos":"alto|medio|bajo","grasas":"alta|media|baja","nota":"consejo breve de 1 oración"}`;
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:state.imageBase64}},
          {type:"text",text:"Analizá esta foto de mi comida"}
        ]}]
      })
    });
    const data=await resp.json();
    const text=(data.content||[]).map(b=>b.text||"").join("");
    const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
    state.aiResult=parsed;
    state.editIngredients=(parsed.ingredientes||[]).map((ing,i)=>({id:Date.now()+i,val:ing}));
    state.aiStep="confirm";
  } catch(e) {
    state.error="No pude analizar la foto. Podés guardarla igual con el botón de abajo.";
  }
  state.loading=false; render();
}

// ── Save food log ──────────────────────────────────────
function saveFoodLog(photoOnly) {
  const ingredients=state.editIngredients.map(i=>i.val).filter(v=>v.trim());
  const log={
    id:Date.now(), date:state.selectedDay, logType:"food", mealType:state.mealType,
    imageData: state.imageBase64 ? ("data:image/jpeg;base64,"+state.imageBase64) : null,
    resumen: photoOnly
      ? (state.manualText.trim() ? state.manualText.substring(0,80) : "Foto guardada 📷")
      : (state.aiResult ? state.aiResult.resumen : (state.manualText.substring(0,80)||"Comida registrada")),
    ingredientes: photoOnly ? [] : (state.aiResult ? ingredients : (state.manualText?[state.manualText]:[])),
    comentario: photoOnly && state.manualText.trim() ? state.manualText : null,
    calorias_estimadas: photoOnly?null:(state.aiResult?.calorias_estimadas||null),
    calidad: photoOnly?null:(state.aiResult?.calidad||null),
    proteinas: photoOnly?null:(state.aiResult?.proteinas||null),
    carbohidratos: photoOnly?null:(state.aiResult?.carbohidratos||null),
    grasas: photoOnly?null:(state.aiResult?.grasas||null),
    nota: photoOnly?null:(state.aiResult?.nota||null),
  };
  state.logs.push(log); saveLogs();
  state.imageBase64=null; state.imagePreviewUrl=null;
  state.manualText=""; state.aiResult=null; state.editIngredients=[];
  state.aiStep="saved"; render();
  setTimeout(()=>{ state.aiStep="input"; render(); },1800);
}

function logGym(fue) {
  const log={id:Date.now(),date:state.selectedDay,logType:"training",mealType:null,fue,
    resumen:fue?"Fue al gym ✅":"No fue al gym ❌",nota:fue?"¡Excelente! Seguí así.":"Mañana es otra oportunidad."};
  state.logs.push(log); saveLogs(); render();
}

function updateIngredient(id,val){ state.editIngredients=state.editIngredients.map(i=>i.id===id?{...i,val}:i); }
function deleteIngredient(id){ state.editIngredients=state.editIngredients.filter(i=>i.id!==id); render(); }
function addIngredient(){ const v=state.newIngredient.trim(); if(!v) return; state.editIngredients.push({id:Date.now(),val:v}); state.newIngredient=""; render(); }

function handleImage(input) {
  const file=input.files[0]; if(!file) return;
  state.imagePreviewUrl=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{
    const MAX=800; let w=img.width,h=img.height;
    if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
    const canvas=document.createElement("canvas");
    canvas.width=w; canvas.height=h;
    canvas.getContext("2d").drawImage(img,0,0,w,h);
    state.imageBase64=canvas.toDataURL("image/jpeg",0.7).split(",")[1];
    state.aiStep="input"; state.error=null; render();
  };
  img.src=state.imagePreviewUrl;
}

// ── Export as image ────────────────────────────────────
async function exportWeekImage() {
  const weekDays=getWeekDays();
  const canvas=document.getElementById("export-canvas");
  const ctx=canvas.getContext("2d");
  const W=800, ROW=110, HEADER=120, FOOTER=60;
  const totalRows = weekDays.length;
  canvas.width=W;
  canvas.height=HEADER + totalRows*ROW + FOOTER;

  // background
  ctx.fillStyle="#0f0f14";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // header
  ctx.fillStyle="#6366f1";
  ctx.fillRect(0,0,W,80);
  ctx.fillStyle="#fff";
  ctx.font="bold 28px -apple-system, system-ui, sans-serif";
  ctx.fillText("💪 Mis Hábitos — Resumen semanal",24,50);

  const now=new Date();
  ctx.fillStyle="#c7d2fe";
  ctx.font="16px system-ui";
  ctx.fillText(now.toLocaleDateString("es-AR",{weekday:"long",year:"numeric",month:"long",day:"numeric"}),24,72);

  // stats bar
  const gymDays=weekDays.filter(d=>getDayLogs(d).some(l=>l.logType==="training"&&l.fue)).length;
  const totalFood=state.logs.filter(l=>l.logType==="food"&&weekDays.includes(l.date)).length;
  ctx.fillStyle="#1a1a24";
  ctx.fillRect(0,80,W,40);
  ctx.fillStyle=gymDays>=4?"#4ade80":gymDays>=2?"#facc15":"#f87171";
  ctx.font="bold 15px system-ui";
  ctx.fillText(`🏋️ Gym: ${gymDays}/4 días`,24,106);
  ctx.fillStyle="#60a5fa";
  ctx.fillText(`🥗 Comidas registradas: ${totalFood}`,220,106);

  // day rows
  weekDays.forEach((day,idx)=>{
    const y=HEADER+idx*ROW;
    const dl=getDayLogs(day);
    const d=new Date(day+"T12:00:00");
    const sc=getDayScore(day);
    const trained=dl.some(l=>l.logType==="training"&&l.fue);
    const foodLogs=dl.filter(l=>l.logType==="food");

    // row bg
    ctx.fillStyle=idx%2===0?"#13131a":"#16161f";
    ctx.fillRect(0,y,W,ROW);

    // left color bar
    ctx.fillStyle=scoreColor(sc);
    ctx.fillRect(0,y,4,ROW);

    // day label
    ctx.fillStyle="#e2e8f0";
    ctx.font="bold 16px system-ui";
    ctx.fillText(DAYS_FULL[d.getDay()],14,y+28);
    ctx.fillStyle="#6b7280";
    ctx.font="13px system-ui";
    ctx.fillText(formatDate(day),14,y+48);

    // gym badge
    if(trained!==undefined && dl.some(l=>l.logType==="training")) {
      const gymLog=dl.find(l=>l.logType==="training");
      ctx.fillStyle=gymLog&&gymLog.fue?"#052e16":"#2d0a0a";
      roundRect(ctx,14,y+56,80,22,6);
      ctx.fill();
      ctx.fillStyle=gymLog&&gymLog.fue?"#4ade80":"#f87171";
      ctx.font="12px system-ui";
      ctx.fillText(gymLog&&gymLog.fue?"✅ Gym":"❌ No gym",22,y+71);
    }

    // food entries
    let fx=110;
    foodLogs.slice(0,4).forEach(log=>{
      const meal=MEAL_TYPES.find(m=>m.key===log.mealType);
      ctx.fillStyle="#1e1e2e";
      roundRect(ctx,fx,y+10,170,ROW-20,8);
      ctx.fill();
      ctx.fillStyle="#e2e8f0";
      ctx.font="bold 12px system-ui";
      ctx.fillText((meal?meal.emoji+" "+meal.label:"🥗 Comida"),fx+8,y+28);
      ctx.fillStyle="#9ca3af";
      ctx.font="11px system-ui";
      const resumen=log.resumen||"";
      ctx.fillText(resumen.length>22?resumen.substring(0,22)+"…":resumen,fx+8,y+46);
      if(log.ingredientes&&log.ingredientes.length>0){
        ctx.fillStyle="#4b5563";
        ctx.font="10px system-ui";
        const ing=log.ingredientes.slice(0,2).join(", ");
        ctx.fillText(ing.length>28?ing.substring(0,28)+"…":ing,fx+8,y+62);
      }
      if(log.calidad){
        const qc=qualityColor(log.calidad);
        ctx.fillStyle=qc+"44";
        roundRect(ctx,fx+8,y+70,60,18,4); ctx.fill();
        ctx.fillStyle=qc;
        ctx.font="10px system-ui";
        ctx.fillText(log.calidad,fx+14,y+82);
      }
      fx+=178;
      if(fx+170>W) return;
    });
  });

  // footer
  ctx.fillStyle="#1a1a24";
  ctx.fillRect(0,canvas.height-FOOTER,W,FOOTER);
  ctx.fillStyle="#374151";
  ctx.font="13px system-ui";
  ctx.fillText("Generado con Mis Hábitos · gimenaroppel.github.io/mis-habitos/",24,canvas.height-FOOTER+30);

  // download
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`mis-habitos-${todayKey()}.png`; a.click();
    URL.revokeObjectURL(url);
  },"image/png");
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

        if(log.ingredientes&&log.ingredientes.length>0) html+=`<p class="log-sub">🥬 ${log.ingredientes.map(escH).join(", ")}</p>`;
        if(log.calidad){const qc=qualityColor(log.calidad);html+=`<span class="badge" style="background:${qc}22;color:${qc}">${log.calidad}</span>`;}
        if(log.calorias_estimadas) html+=`<span class="badge" style="background:#a78bfa22;color:#a78bfa">~${log.calorias_estimadas} kcal</span>`;
        html+=`</div>
            <div class="log-actions">
              <button class="log-edit-btn" onclick="openEditModal(${log.id})">✏️</button>
              <button class="log-del-btn" onclick="removeLog(${log.id})">🗑</button>
            </div>
          </div>`;
        if(log.imageData) html+=`<img class="log-photo" src="${log.imageData}" onclick="openPhoto('${log.imageData}')" />`;
        html+=`</div>`;
      });
    }
    html+=`</div>`;
    if(state.logs.length>0) html+=`<button class="delete-all" onclick="deleteAll()">Borrar todos los datos</button>`;
    html+=`</div>`;
  }

  html+=`</div>`;
  app.innerHTML=html;
}

function setState(patch){ Object.assign(state,patch); render(); }
function deleteAll(){ if(confirm("¿Borrar todos los registros?")){ state.logs=[]; saveLogs(); render(); } }

loadLogs();
render();
</script>
</body>
</html>
